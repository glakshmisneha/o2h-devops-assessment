name: Build Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: echo "No tests configured"

      - name: Build Docker Image
        run: docker build -t o2h-app .

      - name: Deploy
        run: echo "Deploy step placeholder"